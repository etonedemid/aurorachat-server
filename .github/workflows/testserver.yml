name: Test AUCv6 server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # Specify your Node version here
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start app and check for crashes
        run: |
          # 1. Start the Node program in the background and save its Process ID (PID)
          node server.js &
          NODE_PID=$!
          
          # 2. Wait for a few seconds to let it initialize/run
          echo "Waiting 10 seconds to ensure the app stays up..."
          sleep 10
          
          # 3. Check if the process is still running
          if kill -0 $NODE_PID 2>/dev/null; then
            echo "App is running smoothly! Sending SIGINT..."
            # Send SIGINT (Ctrl+C) to the process
            kill -2 $NODE_PID
            
            # Wait for the process to actually exit
            wait $NODE_PID
            echo "App exited cleanly."
          else
            echo "Error: The Node.js application crashed or exited early!"
            exit 1
          fi
